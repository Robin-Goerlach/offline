I built you a fullscreen SVG analog watch as a single-file webpage (in the canvas on the right). It updates every second and shows today’s date in the lower part of the dial.

(no heavy re-render), and it automatically pauses when the tab is hidden. On modern devices 
this should be well under 1% CPU most of the time. If you ever need it even lighter, you can:

    .dateText { font-weight: 600; font-size: 8px; fill: var(--text); }
    .numeral { font-weight: 700; font-size: 13px; fill: var(--text); }
    .tick { stroke: var(--tick); stroke-linecap: round; }

    .hand-hour { stroke: #e2e8f0; stroke-width: 2.8; }
    .hand-minute { stroke: #cbd5e1; stroke-width: 2; }
    .hand-second { stroke: var(--accent); stroke-width: 1.2; }

  <div class="wrap" aria-label="Analog clock showing current time">

        </g>

        </g>
        <!-- Second hand with tail -->
        <g id="secondGroup" class="sweep">
          <line id="secondTail" class="hand hand-tail" x1="0" y1="8" x2="0" y2="20" />
          <line id="second" class="hand hand-second" x1="0" y1="12" x2="0" y2="-70" />
        </g>

      <text id="dateText" x="100" y="138" class="dateText" text-anchor="middle">—</text>
    </svg>

  <script>
    (function(){
      const ticks = document.getElementById('ticks');
      const numerals = document.getElementById('numerals');
      const hourGroup = document.getElementById('hourGroup');
      const minuteGroup = document.getElementById('minuteGroup');
      const secondGroup = document.getElementById('secondGroup');
      const dateText = document.getElementById('dateText');

      // Build tick marks and numerals once
      for (let i = 0; i < 60; i++) {
        const angle = i * 6;
        const isHour = i % 5 === 0;
        const len = isHour ? 8 : 4.5;
        const w = isHour ? 1.8 : 0.8;
        const r1 = 82; // inner radius of ticks
        const r2 = r1 + len;
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const rad = angle * Math.PI / 180;
        const x1 = 100 + r1 * Math.sin(rad);
        const y1 = 100 - r1 * Math.cos(rad);
        const x2 = 100 + r2 * Math.sin(rad);
        const y2 = 100 - r2 * Math.cos(rad);
        tick.setAttribute('x1', x1);
        tick.setAttribute('y1', y1);
        tick.setAttribute('x2', x2);
        tick.setAttribute('y2', y2);
        tick.setAttribute('class', 'tick');
        tick.setAttribute('stroke-width', w);
        ticks.appendChild(tick);

        if (isHour) {
          const hour = i/5 === 0 ? 12 : i/5;
          const numR = 67;
          const nx = 100 + numR * Math.sin(rad);
          const ny = 100 - numR * Math.cos(rad);
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.textContent = hour;
          t.setAttribute('x', nx);
          t.setAttribute('y', ny + 1.0);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('dominant-baseline', 'central');
          t.setAttribute('class', 'numeral');
          numerals.appendChild(t);
        }
      }

      // Format date like: Fri, 31 Oct 2025
      const dateFormatter = new Intl.DateTimeFormat(undefined, { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });

      function setRotation(elGroup, angle){
        // Rotate groups around (0,0) which is already translated to center (100,100)
        elGroup.setAttribute('transform', `rotate(${angle})`);
      }

      function update(){
        const now = new Date();
        const s = now.getSeconds();
        const m = now.getMinutes();
        const h = now.getHours() % 12;

        const secondAngle = s * 6; // 360/60
        const minuteAngle = m * 6 + s * 0.1; // 6 deg per min + 0.1 per sec
        const hourAngle = h * 30 + m * 0.5 + s * (0.5/60); // 30 per hour, 0.5 per min, tiny per sec

        setRotation(secondGroup, secondAngle);
        setRotation(minuteGroup, minuteAngle);
        setRotation(hourGroup, hourAngle);

        dateText.textContent = dateFormatter.format(now);
      }

      // Keep updates aligned to the next whole second
      function startTicker(){
        update();
        const now = Date.now();
        const delay = 1000 - (now % 1000);
        setTimeout(() => {
          update();
          timer = setInterval(update, 1000);
        }, delay);
      }

      let timer = null;
      startTicker();

      // Pause updates when the tab is hidden (saves battery/CPU)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          if (timer) { clearInterval(timer); timer = null; }
        } else {
          startTicker();
        }
      });
    })();
  </script>
</body>
</html>

      <desc id="desc">An analog watch updated every second with a smooth sweeping second hand and the current date below the hands.</desc>

      <defs>
        <radialGradient id="faceGrad" cx="50%" cy="45%" r="60%">
          <stop offset="0%" stop-color="#0f172a" />

        </g>
        <circle class="center-cap" r="2.2" />
      </g>
    </svg>
  </div>

  <script>
    (function(){
      const ticks = document.getElementById('ticks');
      const numerals = document.getElementById('numerals');
      const hourGroup = document.getElementById('hourGroup');
      const minuteGroup = document.getElementById('minuteGroup');
      const secondGroup = document.getElementById('secondGroup');
      const dateText = document.getElementById('dateText');
      const tzText = document.getElementById('tzText');

      for (let i = 0; i < 60; i++) {
        const angle = i * 6;
        const isHour = i % 5 === 0;
        const len = isHour ? 8 : 4.5;
        const w = isHour ? 1.8 : 0.8;
        const r1 = 82;
        const r2 = r1 + len;
        const tick = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        const rad = angle * Math.PI / 180;
        const x1 = 100 + r1 * Math.sin(rad);
        const y1 = 100 - r1 * Math.cos(rad);
        const x2 = 100 + r2 * Math.sin(rad);
        const y2 = 100 - r2 * Math.cos(rad);
        tick.setAttribute('x1', x1);
        tick.setAttribute('y1', y1);
        tick.setAttribute('x2', x2);
        tick.setAttribute('y2', y2);
        tick.setAttribute('class', 'tick');
        tick.setAttribute('stroke-width', w);
        ticks.appendChild(tick);

        if (isHour) {
          const hour = i/5 === 0 ? 12 : i/5;
          const numR = 67;
          const nx = 100 + numR * Math.sin(rad);
          const ny = 100 - numR * Math.cos(rad);
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.textContent = hour;
          t.setAttribute('x', nx);
          t.setAttribute('y', ny + 1.0);
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('dominant-baseline', 'central');
          t.setAttribute('class', 'numeral');
          numerals.appendChild(t);
        }
      }

      const dateFormatter = new Intl.DateTimeFormat(undefined, { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
      let lastDayKey = '';
      let lastMinuteKey = -1;
      let driftMs = 0; // serverUTC - localUTC

      function setRotation(elGroup, angle){
        elGroup.style.transform = `rotate(${angle}deg)`;
      }

      function update(){
        const localNow = Date.now();
        const adjusted = localNow + driftMs; // corrected for server UTC
        const now = new Date(adjusted);

        const ms = now.getMilliseconds();
        const s = now.getSeconds() + ms / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;

        const secondAngle = s * 6;
        const minuteAngle = m * 6;
        const hourAngle = h * 30;

        setRotation(secondGroup, secondAngle);
        setRotation(minuteGroup, minuteAngle);
        setRotation(hourGroup, hourAngle);

        const dayKey = now.toDateString();
        if (dayKey !== lastDayKey) {
          dateText.style.opacity = 0;
          setTimeout(() => {
            dateText.textContent = dateFormatter.format(now);
            dateText.style.opacity = 1;
          }, 120);
          lastDayKey = dayKey;
        }

        // Update TZ label at most once per minute (handles DST changes too)
        const minuteKey = Math.floor(adjusted / 60000);
        if (minuteKey !== lastMinuteKey) {
          const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone; // IANA, e.g., Europe/Berlin
          const parts = new Intl.DateTimeFormat(undefined, { timeZoneName: 'shortOffset' }).formatToParts(now);
          const tzOffset = parts.find(p => p.type === 'timeZoneName')?.value || '';
          tzText.textContent = `${tzName} ${tzOffset}`;
          lastMinuteKey = minuteKey;
        }

        requestAnimationFrame(update);
      }

      // Initialize once so the date is set immediately
      (function init(){
        const now = new Date();
        lastDayKey = now.toDateString();
        dateText.textContent = dateFormatter.format(now);
      })();

      // Fetch trusted UTC time to avoid local clock drift
      async function syncServerTime(){
        try{
          const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC', { cache: 'no-store' });
          if(!res.ok) throw new Error('time fetch failed');
          const data = await res.json();
          const serverMs = (typeof data.unixtime === 'number') ? data.unixtime * 1000 : Date.parse(data.datetime);
          const localMs = Date.now();
          driftMs = serverMs - localMs; // positive => local clock is behind
        } catch(err){
          console.warn('Time sync failed:', err);
        }
      }

      // Initial sync and periodic resync every 10 minutes
      syncServerTime();
      setInterval(syncServerTime, 10 * 60 * 1000);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) syncServerTime(); });

      requestAnimationFrame(update);
    })();
  </script>
</body>
